body {

}

.container {
    max-width:500px;
    margin:auto;
    background:white;
    padding:16px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align:center;
    color:#c00000;
}

label {
    font-size:13px;
    font-weight:bold;
}

input, select, button {
    width:100%;
    padding:12px;
    margin:6px 0 14px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

button {
    background:#c00000;
    color:white;
    font-weight:bold;
}

button:disabled {
    background:#999;
}

.hidden { display:none; }

.badge {
    background:#c00000;
    color:white;
    padding:6px;
    border-radius:8px;
    font-size:13px;
    text-align:center;
}

.summary {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.summary .badge {
    flex:1;
}

.table-wrapper {
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse:collapse;
    min-width:400px;
}

th {
    background:#c00000;
    color:white;
    padding:10px;
}

td {
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

/* DROPDOWN SEARCH */
.dropdown {
    border:1px solid #ddd;
    border-radius:8px;
    max-height:150px;
    overflow-y:auto;
    display:none;
    background:white;
}

.dropdown div {
    padding:10px;
}

.dropdown div:hover {
    background:#f0f0f0;
    cursor:pointer;
}

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box {
    background:white;
    padding:20px;
    border-radius:12px;
    width:90%;
    text-align:center;
}

</style>
</head>

<input type="number" id="harga" oninput="hitungTotal()">

<label>Qty</label>
<input type="number" id="qty" oninput="hitungTotal()">

<label>Total</label>
<input type="number" id="total" readonly>

<div class="summary">
<div class="badge">Qty: <span id="totalQty">0</span></div>

let items = [];
let selectedSKU = null;

function el(id){ return document.getElementById(id); }

/* STEP */
function lanjut(){

    const tgl = el("tanggal").value;
    const namaVal = el("nama").value;
    const outletVal = el("outlet").value;

    if(!tgl || !namaVal || !outletVal){
        alert("Lengkapi data");
        return;
    }

    el("step1").classList.add("hidden");
    el("step2").classList.remove("hidden");

    el("namaFix").value = namaVal;
    el("outletFix").value = outletVal;
    el("tanggalView").innerHTML = "Tanggal: " + tgl;
}

/* SEARCH SKU */
function filterSKU(){

    const keyword = el("searchSku").value.toLowerCase();
    const dropdown = el("dropdownSku");

    dropdown.innerHTML = "";
    selectedSKU = null;

    if(!keyword){
        dropdown.style.display = "none";
        return;
    }

    const results = skuList.filter(item =>
        item.nama.toLowerCase().includes(keyword)
    );

    results.forEach(item=>{
        const div = document.createElement("div");
        div.innerHTML = item.nama;

        div.onclick = function(){
            el("searchSku").value = item.nama;
            el("harga").value = item.harga;

            selectedSKU = item.nama;

            dropdown.style.display = "none";
            hitungTotal();
        };

        dropdown.appendChild(div);
    });

    dropdown.style.display = "block";
}

/* HITUNG */
function hitungTotal(){
    const harga = Number(el("harga").value) || 0;
    const qty = Number(el("qty").value) || 0;
    el("total").value = harga * qty;
}

/* TAMBAH */
function inputData(){

    if(!selectedSKU){
        alert("Pilih SKU dari list");
        return;
    }

    const harga = el("harga").value;
    const qty = el("qty").value;
    const total = el("total").value;

    if(!harga || !qty){
        alert("Lengkapi data");
        return;
    }

    items.push({
        sku: selectedSKU,
        harga: Number(harga),
        qty: Number(qty),
        total: Number(total)
    });

    renderTable();
    resetInput();
}

/* RESET */
function resetInput(){
    el("searchSku").value = "";
    el("harga").value = "";
    el("qty").value = "";
    el("total").value = "";
    selectedSKU = null;
}

/* RENDER */
function renderTable(){

    let html = "";
    let tq = 0;
    let tv = 0;

    items.forEach((item,i)=>{

        tq += item.qty;
        tv += item.total;

        html += `
        <tr>
        <td>${item.sku}</td>
        <td>${item.harga}</td>
        <td>${item.qty}</td>
        <td>${item.total}</td>
        <td><button onclick="deleteItem(${i})">🗑</button></td>
        </tr>`;
    });

    el("queue").innerHTML = html;
    el("totalQty").innerHTML = tq;
    el("totalValue").innerHTML = tv.toLocaleString();
}

/* DELETE */
function deleteItem(i){
    if(!confirm("Hapus item?")) return;
    items.splice(i,1);
    renderTable();
}

/* MODAL */
function openModal(){
    if(items.length===0){
        alert("Data kosong");
        return;
    }
    el("modal").style.display="flex";
}

function closeModal(){
    el("modal").style.display="none";
}

/* SUBMIT */
function submitData(){

    const btn = el("btnSimpan");

    btn.disabled = true;
    btn.innerHTML = "Menyimpan...";

    fetch(URL_SCRIPT,{
        method:"POST",
        body: JSON.stringify({
            tanggal: el("tanggal").value,
            nama: el("namaFix").value,
            outlet: el("outletFix").value,
            items: items
        })
    })
    .then(res=>res.json())
    .then(()=>{
        alert("Berhasil disimpan");
        location.reload();
    })
    .catch(()=>{
        alert("Gagal");
        btn.disabled=false;
        btn.innerHTML="SIMPAN";
    });
}
